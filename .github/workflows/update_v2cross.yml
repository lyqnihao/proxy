# 这是一个用于获取 v2cross 动态订阅地址的 GitHub Actions 工作流。
# 功能包括：通过 Python 脚本获取动态 URL，用于更新 README.md。

# GitHub Actions 工作流完整修正版
name: Update v2cross

on:
  #schedule:
  # 北京时间每12小时更新：1:35 AM (UTC 17:35前一天) 和 1:35 PM (UTC 5:35)
  #- cron: '35 17,5 * * *'
  # 已改为手动模式，由统一工作流 update-all.yml 调度
  workflow_dispatch:
  # schedule:
    # 北京时间每天1:35运行(UTC时间17:35)，然后每隔12小时运行一次
  #  - cron: '35 17/12 * * *'

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      # --------------------------
      # 步骤1：检出代码（保持原样）
      # --------------------------
      - name: 检出仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --------------------------
      # 步骤2：Python环境设置（保持原样）
      # --------------------------      
      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      # --------------------------
      # 步骤3：安装依赖（保持原样）
      # --------------------------      
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pyyaml

      # --------------------------
      # 步骤4：北京时间戳（保持原样）
      # --------------------------
      - name: 获取北京时间（用于时间戳）
        id: date
        run: |
          echo "CURRENT_DATE=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV

      # --------------------------
      # 步骤5：运行Python脚本（关键修改点）
      # --------------------------      
      - name: 运行 Python 脚本
        id: run_script
        run: |
          # 捕获输出并去除换行符
          output=$(python v2cross/update.py 2>&1 | tr -d '\n')
          exit_code=$?
          
          # 调试输出
          echo "脚本原始输出：[${output}]"
          echo "退出码：$exit_code"
          
          # 设置多环境变量
          if [ $exit_code -ne 0 ]; then
            echo "script_status=failure" >> $GITHUB_OUTPUT
            echo "error_message=$output" >> $GITHUB_OUTPUT
          else
            echo "DYNAMIC_URL=${output}" | tee -a $GITHUB_ENV  # 同时写入环境变量
            echo "script_status=success" >> $GITHUB_OUTPUT
            echo "DYNAMIC_URL=${output}" >> $GITHUB_OUTPUT
          fi

      # --------------------------
      # 步骤6：脚本状态检查
      # --------------------------      
      - name: 检查脚本状态
        id: check_script
        run: |
          if [ "${{ steps.run_script.outputs.script_status }}" == "failure" ]; then
            echo "send_email=true" >> $GITHUB_OUTPUT
            echo "error_type=脚本运行失败" >> $GITHUB_OUTPUT
          else
            echo "send_email=false" >> $GITHUB_OUTPUT
            echo "✓ v2cross URL获取成功: ${{ env.DYNAMIC_URL }}"
          fi

      # --------------------------
      # 步骤7：异常通知（脚本失败时发送邮件）
      # --------------------------
      - name: Notify on failure
        # 触发条件：脚本运行失败
        if: failure() || steps.check_script.outputs.send_email == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          # SMTP服务器配置（163邮箱示例）
          server_address: smtp.163.com
          server_port: 465
          # 认证信息（需在仓库Secrets中设置）
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          
          # 邮件主题（含时间戳）
          subject: "v2cross获取URL出错 ${{ env.CURRENT_DATE }}"
          
          # 邮件正文模板（使用管道符保持格式）
          body: |
            详情报告：
            - 时间: ${{ env.CURRENT_DATE }}
            - 脚本版本: 2.0
            - 功能: 仅获取动态URL用于更新README.md
            - 日志链接: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
            - 错误类型: ${{ steps.check_script.outputs.error_type }}

          # 收件人配置
          to: lyqnihao@163.com
          from: ${{ secrets.EMAIL_USERNAME }}
          
          # 内容类型设置为纯文本
          content_type: text/plain
