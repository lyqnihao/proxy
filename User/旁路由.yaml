# ======================
# OpenClash 单文件基础配置
# 包含两个旁路由节点及常见分流规则
# ======================

# 核心端口与模式
port: 7890
socks-port: 7891
allow-lan: false
mode: rule
log-level: info
external-controller: 127.0.0.1:9090

# 代理节点列表 (静态定义)
proxies:
  - name: 旁路由_6
    输入: socks5
    server: 192.168.10.6
    port: 7893
  - name: 旁路由_251
    输入: socks5
    server: 192.168.10.251
    port: 7893
  - name: 旁路由_252
    输入: socks5
    server: 192.168.10.252
    port: 7893

# 代理组
proxy-groups:
  - name: PROXY # 默认代理组 (所有规则将指向此组)
    输入: select
    proxies:
      - 🚀 自动选择
      - DIRECT
      - 旁路由_6
      - 旁路由_251
      - 旁路由_252

  - name: 🚀 自动选择 # 自动测试并选择最佳节点
    输入: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    proxies:
      - 旁路由_6
      - 旁路由_251
      - 旁路由_252

  - name: 🛑 广告拦截
    输入: select
    proxies:
      - REJECT
      - DIRECT

# ====================== 分流规则 ======================
# 规则顺序：从上到下匹配，匹配即停止。
# 1. 直连规则 (国内服务、局域网、自有域名)
# 2. 代理规则 (国外服务、被屏蔽服务)
# 3. 广告规则 (广告)
# 4. 最终兜底
# ===================================================
rules:
  # 0. 自有域名直连规则（）
  - RULE-SET,lyqnihao.dpdns.org,DIRECT

  # 1. 基础直连规则（局域网、国内域名/IP、下载）
  - RULE-SET,LocalAreaNetwork,DIRECT
  - RULE-SET,ChinaDomain,DIRECT
  - RULE-SET,ChinaCompanyIp,DIRECT
  - RULE-SET,Download,DIRECT

  # 2. 国内媒体与服务 (直连)
  - RULE-SET,ChinaMedia,DIRECT
  - RULE-SET,Bilibili,DIRECT
  - RULE-SET,BilibiliHMT,DIRECT
  - RULE-SET,NetEaseMusic,DIRECT
  - RULE-SET,GoogleCN,DIRECT
  - RULE-SET,SteamCN,DIRECT

  # 3. 广告拦截 (直连或拦截，select选择)
  - RULE-SET,UnBan,🛑 广告拦截
  - RULE-SET,BanAD,🛑 广告拦截
  - RULE-SET,BanProgramAD,🛑 广告拦截

  # 4. 国外服务与需代理媒体 (全部指向 PROXY)
  - RULE-SET,GoogleFCM,PROXY
  - RULE-SET,Bing,PROXY
  - RULE-SET,OneDrive,PROXY
  - RULE-SET,Microsoft,PROXY
  - RULE-SET,Apple,PROXY
  - RULE-SET,Telegram,PROXY
  - RULE-SET,AI,PROXY
  - RULE-SET,OpenAi,PROXY
  - RULE-SET,Epic,PROXY
  - RULE-SET,Origin,PROXY
  - RULE-SET,Sony,PROXY
  - RULE-SET,Steam,PROXY
  - RULE-SET,Nintendo,PROXY
  - RULE-SET,YouTube,PROXY
  - RULE-SET,Netflix,PROXY
  - RULE-SET,Bahamut,PROXY
  - RULE-SET,ProxyMedia,PROXY
  - RULE-SET,ProxyGFWlist,PROXY

  # 5. 地理IP与最终兜底规则
  - GEOIP,CN,DIRECT
  - MATCH,PROXY

# 规则提供者 (保持不变)
